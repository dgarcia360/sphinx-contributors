---

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: "Install dependencies"
        run: |
          python -m pip install .[test,doc]
      - name: "Lint code"
        run: |
          pre-commit run --all-files

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        sphinx-version: ["sphinx>=9,<10"]
        exclude:
          # Sphinx 9 requires Python 3.11+
          - python-version: "3.10"
            sphinx-version: "sphinx>=9,<10"
        include:
          # Test older Sphinx versions only on Python 3.12
          - python-version: "3.12"
            sphinx-version: "sphinx>=7,<8"
          - python-version: "3.12"
            sphinx-version: "sphinx>=8,<9"

    name: "Python ${{ matrix.python-version }} / Sphinx ${{ matrix.sphinx-version }}"

    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: "Install dependencies"
        run: |
          python -m pip install .[test,doc]
          python -m pip install "${{ matrix.sphinx-version }}"
      - name: "Build sample"
        run: |
          make -C docs dirhtml
      - name: "Run tests"
        run: |
          pytest -vvv
